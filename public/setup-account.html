<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .message.show {
            display: block;
        }
        .password-strength {
            margin-top: 5px;
            font-size: 12px;
        }
        .strength-weak { color: #dc3545; }
        .strength-medium { color: #ffc107; }
        .strength-strong { color: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 Setup Your Account</h1>
            <p>Create a secure password to activate your account</p>
        </div>
        
        <div id="message" class="message"></div>
        
        <form id="setupForm">
            <input type="hidden" id="token" name="token">
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password (min 8 characters)" required>
                <div id="passwordStrength" class="password-strength"></div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
            </div>
            
            <button type="submit" class="btn">Activate Account</button>
        </form>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        document.getElementById('token').value = token;

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthDiv = document.getElementById('passwordStrength');

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 'Weak';
            let className = 'strength-weak';

            if (password.length >= 8) {
                if (password.match(/[a-z]/) && password.match(/[A-Z]/) && password.match(/[0-9]/) && password.match(/[^a-zA-Z0-9]/)) {
                    strength = 'Strong';
                    className = 'strength-strong';
                } else if ((password.match(/[a-z]/) || password.match(/[A-Z]/)) && password.match(/[0-9]/)) {
                    strength = 'Medium';
                    className = 'strength-medium';
                }
            }

            strengthDiv.textContent = `Password strength: ${strength}`;
            strengthDiv.className = `password-strength ${className}`;
        });

        // Form submission
        document.getElementById('setupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const messageDiv = document.getElementById('message');
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const token = document.getElementById('token').value;

            // Validate passwords match
            if (password !== confirm_password) {
                messageDiv.textContent = 'Passwords do not match!';
                messageDiv.className = 'message error show';
                return;
            }

            // Validate password length
            if (password.length < 8) {
                messageDiv.textContent = 'Password must be at least 8 characters long!';
                messageDiv.className = 'message error show';
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/setup-account', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        password: password,
                        confirm_password: confirm_password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.textContent = '✅ Account activated successfully! Redirecting to login...';
                    messageDiv.className = 'message success show';
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    messageDiv.textContent = `❌ ${data.message}`;
                    messageDiv.className = 'message error show';
                }
            } catch (error) {
                messageDiv.textContent = `❌ Error: ${error.message}`;
                messageDiv.className = 'message error show';
            }
        });
    </script>
</body>
</html>
