<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .message.show {
            display: block;
        }
        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .user-info.show {
            display: block;
        }
        .user-info h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #666;
            font-size: 14px;
        }
        .info-value {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Login</h1>
            <p>Enter your credentials to access your account</p>
        </div>
        
        <div id="message" class="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your.email@company.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn">Login</button>
        </form>

        <div id="userInfo" class="user-info">
            <h3>✅ Login Successful!</h3>
            <div class="info-row">
                <span class="info-label">Name:</span>
                <span class="info-value" id="userName"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Email:</span>
                <span class="info-value" id="userEmail"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Role:</span>
                <span class="info-value" id="userRole"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Employee ID:</span>
                <span class="info-value" id="employeeId"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Department:</span>
                <span class="info-value" id="userDepartment"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Token:</span>
                <span class="info-value" id="userToken" style="font-size: 10px; word-break: break-all;"></span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const messageDiv = document.getElementById('message');
            const userInfoDiv = document.getElementById('userInfo');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.textContent = '✅ Login successful!';
                    messageDiv.className = 'message success show';
                    
                    // Store token
                    localStorage.setItem('token', data.data.token);
                    
                    // Show user info
                    document.getElementById('userName').textContent = data.data.user.full_name;
                    document.getElementById('userEmail').textContent = data.data.user.email;
                    document.getElementById('userRole').textContent = data.data.user.role;
                    document.getElementById('employeeId').textContent = data.data.user.employee_id;
                    document.getElementById('userDepartment').textContent = data.data.user.department || 'N/A';
                    document.getElementById('userToken').textContent = data.data.token;
                    
                    userInfoDiv.className = 'user-info show';
                    
                    // Hide form
                    document.getElementById('loginForm').style.display = 'none';
                } else {
                    messageDiv.textContent = `❌ ${data.message}`;
                    messageDiv.className = 'message error show';
                    userInfoDiv.className = 'user-info';
                }
            } catch (error) {
                messageDiv.textContent = `❌ Error: ${error.message}`;
                messageDiv.className = 'message error show';
                userInfoDiv.className = 'user-info';
            }
        });
    </script>
</body>
</html>
